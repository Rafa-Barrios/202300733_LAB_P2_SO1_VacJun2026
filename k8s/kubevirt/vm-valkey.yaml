apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-valkey
  namespace: sopes1
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-valkey
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          - name: emptydisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
      networks:
      - name: default
        pod: {}
      volumes:
      - name: containerdisk
        containerDisk:
          image: quay.io/containerdisks/ubuntu:22.04
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            user: ubuntu
            password: ubuntu123
            chpasswd:
              expire: false
      - name: emptydisk
        emptyDisk:
          capacity: 5Gi