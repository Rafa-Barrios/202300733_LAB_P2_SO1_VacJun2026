apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-valkey
  namespace: sopes1
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-valkey
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 512Mi
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
      networks:
      - name: default
        pod: {}
      volumes:
      - name: containerdisk
        containerDisk:
          image: quay.io/containerdisks/fedora:39
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            user: fedora
            password: fedora123
            chpasswd:
              expire: false
            packages:
              - containerd
            runcmd:
              - systemctl enable containerd
              - systemctl start containerd
              - ctr image pull docker.io/valkey/valkey:8-alpine
              - ctr run -d --net-host docker.io/valkey/valkey:8-alpine valkey