apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-api
  namespace: sopes1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-api
  template:
    metadata:
      labels:
        app: rust-api
    spec:
      containers:
      - name: rust-api
        image: 34.59.122.115:5000/sopes1/rust-api:v1.0
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: GO_CLIENT_URL
          value: "http://go-deployment1-service.sopes1.svc.cluster.local:8080"
        - name: RUST_LOG
          value: "info"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 3